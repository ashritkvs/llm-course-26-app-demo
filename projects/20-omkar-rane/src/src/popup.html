<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PR Description Writer</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        padding: 12px 14px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 13px;
        background: #0d1117;
        color: #e6edf3;
        width: 320px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      h1 span.logo {
        font-size: 15px;
      }
      .section {
        margin-bottom: 10px;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        color: #8b949e;
      }
      input[type="password"],
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #30363d;
        background: #161b22;
        color: #e6edf3;
        font-size: 12px;
      }
      input[type="password"]::placeholder {
        color: #6e7681;
      }
      input[type="password"]:focus,
      select:focus {
        outline: none;
        border-color: #1f6feb;
        box-shadow: 0 0 0 1px rgba(31, 111, 235, 0.6);
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 6px;
      }
      button {
        padding: 5px 12px;
        border-radius: 999px;
        border: 1px solid #238636;
        background: #238636;
        color: #ffffff;
        font-size: 12px;
        cursor: pointer;
      }
      button:hover {
        background: #2ea043;
        border-color: #2ea043;
      }
      a.clear-link {
        font-size: 11px;
        color: #8b949e;
        text-decoration: none;
        cursor: pointer;
      }
      a.clear-link:hover {
        color: #f85149;
        text-decoration: underline;
      }
      #status {
        min-height: 16px;
        margin-top: 6px;
        font-size: 11px;
      }
      #status.ok {
        color: #3fb950;
      }
      #status.error {
        color: #f85149;
      }
      .footer {
        margin-top: 10px;
        font-size: 11px;
        color: #8b949e;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .footer a {
        color: #58a6ff;
        text-decoration: none;
        white-space: nowrap;
      }
      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h1><span class="logo">✨</span><span>PR Description Writer</span></h1>

    <div class="section">
      <label for="apiKey">OpenAI API Key</label>
      <input
        type="password"
        id="apiKey"
        placeholder="sk-..."
        autocomplete="off"
      />
      <div class="row">
        <button id="saveBtn" type="button">Save Key</button>
        <a href="#" id="clearLink" class="clear-link">Clear</a>
      </div>
      <div id="status"></div>
    </div>

    <div class="section">
      <label for="templateSelect">Template</label>
      <select id="templateSelect">
        <option value="minimal">minimal</option>
        <option value="team">team</option>
        <option value="oss">oss</option>
      </select>
    </div>

    <div class="footer">
      <span>Need an API key?</span>
      <a
        href="https://platform.openai.com"
        target="_blank"
        rel="noreferrer noopener"
        >Open OpenAI Console</a
      >
    </div>

    <script src="popup.js"></script>
  </body>
</html>
