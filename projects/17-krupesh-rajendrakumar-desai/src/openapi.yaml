openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: UniFlow API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analyze
    description: Course content analysis
  - name: chat
    description: AI chat assistant
  - name: feedback
    description: Peer feedback helper
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /analyze:
    post:
      operationId: analyzeCourse
      tags: [analyze]
      summary: Analyze course text
      description: Analyzes pasted course content and extracts tasks, deadlines, and summaries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeInput"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResult"

  /chat:
    post:
      operationId: chatAssistant
      tags: [chat]
      summary: Chat with AI assistant
      description: Ask questions about course data and get AI-powered answers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: Chat response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /feedback:
    post:
      operationId: polishFeedback
      tags: [feedback]
      summary: Polish peer feedback
      description: Converts rough peer feedback notes into a polished, structured review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackInput"
      responses:
        "200":
          description: Polished feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AnalyzeInput:
      type: object
      required:
        - text
        - source
      properties:
        text:
          type: string
          description: The raw course content to analyze
        source:
          type: string
          description: The source platform (brightspace, discord, googledrive, quiz, feedback)
        courseContext:
          type: ["string", "null"]
          description: Optional additional course context

    ExtractedTask:
      type: object
      required:
        - id
        - title
        - source
        - priority
        - status
        - explanation
        - confidenceScore
      properties:
        id:
          type: string
        title:
          type: string
        source:
          type: string
        dueDate:
          type: ["string", "null"]
        priority:
          type: string
          enum: [high, medium, low]
        status:
          type: string
          enum: [pending, completed, overdue]
        explanation:
          type: string
        confidenceScore:
          type: number

    AnalyzeResult:
      type: object
      required:
        - summary
        - tasks
        - weeklyPlan
        - missedItems
        - urgentItems
        - sourceBreakdown
      properties:
        summary:
          type: string
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedTask"
        weeklyPlan:
          type: string
        missedItems:
          type: array
          items:
            type: string
        urgentItems:
          type: array
          items:
            type: string
        sourceBreakdown:
          type: object
          additionalProperties:
            type: integer

    ChatInput:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        courseContext:
          type: ["string", "null"]
          description: Serialized course data for context

    ChatResponse:
      type: object
      required:
        - reply
        - isDemo
      properties:
        reply:
          type: string
        isDemo:
          type: boolean

    FeedbackInput:
      type: object
      required:
        - presenterName
        - projectTitle
        - bestPart
        - improvement
        - clarityRating
        - demoQualityRating
        - usefulnessRating
      properties:
        presenterName:
          type: string
        projectTitle:
          type: string
        bestPart:
          type: string
        improvement:
          type: string
        clarityRating:
          type: integer
        demoQualityRating:
          type: integer
        usefulnessRating:
          type: integer
        notes:
          type: ["string", "null"]

    FeedbackResult:
      type: object
      required:
        - bestPart
        - improvementSuggestion
        - overallFeedback
        - isDemo
      properties:
        bestPart:
          type: string
        improvementSuggestion:
          type: string
        overallFeedback:
          type: string
        isDemo:
          type: boolean
